Here is the same animated **Get the Shortcut** button added to your template version:

```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feather Breakfree</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d0d0d;
            color: #e6e6e6;
            line-height: 1.7;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-container img {
            width: 130px;
            border-radius: 12px;
            box-shadow: 0 0 15px #00000050;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            text-align: center;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .shortcut-button-container {
            text-align: center;
            margin: 25px 0 35px;
        }

        .shortcut-button {
            display: inline-block;
            padding: 15px 28px;
            border-radius: 999px;
            background: linear-gradient(120deg, #007aff, #7c3aed, #ff2d55, #ff9500);
            background-size: 300% 300%;
            color: #ffffff !important;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-decoration: none;
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.55);
            animation: gradientMove 4s ease infinite, softPulse 2.2s ease-in-out infinite;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .shortcut-button:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 0 35px rgba(255, 45, 85, 0.7);
            background: linear-gradient(120deg, #007aff, #7c3aed, #ff2d55, #ff9500);
            background-size: 300% 300%;
        }

        .shortcut-button:active {
            transform: scale(0.97);
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes softPulse {
            0%, 100% {
                box-shadow: 0 0 22px rgba(0, 122, 255, 0.45);
            }
            50% {
                box-shadow: 0 0 34px rgba(255, 45, 85, 0.75);
            }
        }

        .plist-item {
            background: #1a1a1a;
            padding: 16px 20px;
            border: 1px solid #333;
            border-radius: 10px;
            margin: 15px 0;
            box-shadow: 0 0 10px #00000040;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .plist-item:hover {
            transform: scale(1.02);
            background: #222;
        }

        .plist-item strong {
            font-size: 20px;
            color: #fff;
        }

        .plist-item a {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 14px;
            background: #007aff;
            color: #ffffff !important;
            font-weight: 600;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.15s ease;
        }

        .plist-item a:hover {
            background: #005bbf;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

    </a>
</div>

{{PLIST_BLOCKS}}

<div class="footer">
    Made with ❤️ by Frizzle
    <br>
    Last updated: {{LAST_UPDATED}}
</div>

</body>
</html>
